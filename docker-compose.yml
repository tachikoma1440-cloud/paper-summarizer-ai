version: "3.9"

services:
  backend:
    build: ./backend
    container_name: paper-summarizer-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/data/uploads
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: paper-summarizer-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    env_file:
      - .env
    restart: unless-stopped
